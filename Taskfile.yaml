version: "3"

vars:
  STATIC_DIR: "static/css"
  STATIC_JS_DIR: "static/js"
  DAISYUI_VERSION: "v5.5.18"

tasks:
  # --- Install ---

  setup:
    desc: Install all dependencies
    cmds:
      - task: setup:go
      - task: setup:daisyui
      - task: setup:datastar
      - task: setup:hooks

  setup:hooks:
    desc: Configure git to use project hooks
    cmds:
      - git config core.hooksPath .githooks

  setup:go:
    desc: Install Go dependencies
    cmds:
      - go mod download
      - go mod verify

  setup:daisyui:
    desc: Download DaisyUI plugin files
    cmds:
      - curl -sL -o {{.STATIC_DIR}}/daisyui.mjs https://github.com/saadeghi/daisyui/releases/download/{{.DAISYUI_VERSION}}/daisyui.mjs
      - curl -sL -o {{.STATIC_DIR}}/daisyui-theme.mjs https://github.com/saadeghi/daisyui/releases/download/{{.DAISYUI_VERSION}}/daisyui-theme.mjs
    status:
      - test -f {{.STATIC_DIR}}/daisyui.mjs
      - test -f {{.STATIC_DIR}}/daisyui-theme.mjs

  setup:datastar:
    desc: Install Datastar
    cmds:
      - curl -sL -o {{.STATIC_JS_DIR}}/datastar.js https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.7/bundles/datastar.js
    status:
      - test -f {{.STATIC_JS_DIR}}/datastar.js

  # --- Generate ---
  generate:
    desc: Generate all code
    cmds:
      #- task: generate:icons // removed to speed up CI, Icons alost never change

  generate:icons:
    desc: Generate Lucide icon components
    cmds:
      - go run ./cmd/icongen

  # --- Build (production) ---

  build:templ:
    desc: Generate Go code from .templ files
    cmds:
      - go tool templ generate
    sources:
      - "**/*.templ"
    generates:
      - "**/*_templ.go"

  build:styles:
    desc: Build Tailwind CSS
    cmds:
      - go tool gotailwind -i {{.STATIC_DIR}}/input.css -o {{.STATIC_DIR}}/output.css
    sources:
      - "**/*.{templ,go,css}"
    generates:
      - "{{.STATIC_DIR}}/output.css"

  build:
    desc: Production build
    cmds:
      - go build -o bin/showcase ./cmd/showcase
    deps:
      - build:templ
      - build:styles

  # --- Run ---

  run:
    desc: Run production build
    cmds:
      - ./bin/showcase serve
    deps:
      - build

  run:example:
    desc: Run the showcase example (stream + identity demo)
    cmds:
      - go run ./showcase/example
    deps:
      - build:templ
      - build:styles

  # --- Live reload (development) ---

  live:templ:
    desc: Watch and regenerate templ files
    cmds:
      - go tool templ generate -watch

  live:styles:
    desc: Watch and rebuild Tailwind CSS
    cmds:
      - go tool gotailwind -i {{.STATIC_DIR}}/input.css -o {{.STATIC_DIR}}/output.css -w

  live:showcase:
    desc: Watch Go files and restart showcase server
    cmds:
      - |
        go tool air \
          -build.cmd "go build -o tmp/bin/showcase ./cmd/showcase" \
          -build.bin "tmp/bin/showcase" \
          -build.args_bin "serve -p 3001" \
          -build.exclude_dir "tmp,bin,node_modules,.git" \
          -build.include_ext "go" \
          -build.exclude_regex "_test\\.go$$" \
          -misc.clean_on_exit "true"

  live:
    desc: Start all watchers for development
    deps:
      - live:templ
      - live:styles
      - live:showcase

  # --- Formatting

  format:
    desc: Format all code
    cmds:
      - task: format:go
      - task: format:templ

  format:go:
    desc: Format Go code
    cmds:
      - gofumpt -l -w .

  format:templ:
    desc: Format templates
    cmds:
      - go tool templ fmt .

  # --- Test ---
  test:ci:
    desc: Run all tests in CI environment
    cmds:
      - gotestsum --format github-actions ./...

  # --- Linting
  lint:
    desc: Lint all code
    cmds:
      - task: lint:go

  lint:go:
    desc: Lint Go code
    cmds:
      - golangci-lint run

  # --- Testing

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:e2e:
    desc: Run Playwright E2E tests
    cmds:
      - go test ./tests/e2e/... -v

  test:unit:
    desc: Run unit tests (excludes E2E)
    cmds:
      - go test $(go list ./... | grep -v tests/e2e) -v

  # --- Default ---

  default:
    cmds:
      - task: live

  # --- CI
  ci:
    desc: Run all CI checks
    cmds:
      - task: setup
      - task: generate
      - task: format
      - task: lint
      - task: build
      - task: test:ci
      - task: vuln:ci

  # --- Vulnerability scanning
  vuln:ci:
    desc: Run osv-scanner vulnerability scan
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - osv-scanner scan -r .
